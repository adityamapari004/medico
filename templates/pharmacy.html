<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharmacy Finder | MediGuide</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --teal:    #0ABFA3;
            --blue:    #0891b2;
            --dark:    #070E1C;
            --card:    rgba(11,20,40,0.95);
            --border:  rgba(10,191,163,0.18);
            --text:    #C8D8E8;
            --text-hi: #EEF4FF;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--dark);
            color: var(--text);
            min-height: 100vh;
        }

        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(7,14,28,0.92);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            height: 64px;
        }
        .nav-brand {
            font-family: 'Syne', sans-serif;
            font-size: 20px;
            font-weight: 800;
            color: var(--teal);
            text-decoration: none;
        }
        .nav-links { display: flex; gap: 28px; }
        .nav-links a {
            color: #5A7090;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }
        .nav-links a:hover { color: var(--teal); }
        .nav-links a.active { color: var(--text-hi); }

        .page-header {
            text-align: center;
            padding: 60px 20px 40px;
        }
        .page-header h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(28px, 5vw, 44px);
            font-weight: 800;
            color: var(--text-hi);
            line-height: 1.15;
            margin-bottom: 12px;
        }
        .page-header h1 span { color: var(--teal); }
        .page-header p {
            font-size: 16px;
            color: #5A7090;
            max-width: 520px;
            margin: 0 auto;
        }

        .search-card {
            max-width: 760px;
            margin: 0 auto 40px;
            padding: 0 20px;
        }
        .search-form {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 28px 32px;
        }
        .form-row {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
        }
        .form-group {
            flex: 1;
            min-width: 180px;
        }
        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--teal);
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 12px 16px;
            color: var(--text-hi);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            outline: none;
        }
        .search-btn {
            width: 100%;
            margin-top: 18px;
            padding: 14px;
            background: linear-gradient(135deg, var(--teal), var(--blue));
            border: none;
            border-radius: 12px;
            color: #fff;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        .results-section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px 60px;
            display: grid;
            grid-template-columns: 360px 1fr;
            gap: 24px;
        }
        @media (max-width: 900px) {
            .results-section { grid-template-columns: 1fr; }
        }

        .doctor-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
            max-height: 600px;
            overflow-y: auto;
            padding-right: 6px;
        }

        .doctor-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 18px 20px;
        }
        .doc-header {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 10px;
        }
        .doc-name {
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 700;
            color: var(--text-hi);
        }
        .doc-address {
            font-size: 12px;
            color: #5A7090;
            margin-bottom: 12px;
        }
        .doc-actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .doc-link {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(10,191,163,0.1);
            border: 1px solid rgba(10,191,163,0.25);
            color: var(--teal);
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 12px;
            text-decoration: none;
        }

        .map-panel {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            min-height: 400px;
            position: sticky;
            top: 84px;
            max-height: 600px;
        }
        .map-panel iframe,
        .map-panel > * { width: 100%; height: 100%; min-height: 400px; border: none; }
    </style>
</head>
<body>

<nav>
    <a href="/" class="nav-brand">🩺 MediGuide</a>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/predict">Symptom Check</a>
        <a href="/doctors">Find Doctors</a>
        <a href="/pharmacies" class="active">Pharmacies</a>
    </div>
</nav>

<div class="page-header">
    <h1>Find <span>Pharmacies</span> Near You</h1>
    <p>Search for medical stores and pharmacies in your area.</p>
</div>

<div class="search-card">
    <div class="search-form">
        <form method="POST">
            <div class="form-group">
                <label>Location</label>
                <input type="text" name="location" placeholder="e.g. Mumbai" value="{{ location or '' }}" required>
            </div>
            <button type="submit" class="search-btn">🔍 Search Pharmacies</button>
        </form>
    </div>
</div>

{% if pharmacies %}
<div class="results-section">
    <div class="doctor-list">
        {% for pharm in pharmacies %}
        <div class="doctor-card">
            <div class="doc-header">
                <div class="doc-info">
                    <div class="doc-name">{{ pharm.name }}</div>
                </div>
            </div>
            <div class="doc-address">📍 {{ pharm.full_address }}</div>
            <div class="doc-actions">
                <a href="https://www.google.com/maps?q={{ pharm.latitude }},{{ pharm.longitude }}" target="_blank" class="doc-link">🗺️ Google Maps</a>
            </div>
        </div>
        {% endfor %}
    </div>
    <div class="map-panel">
        {{ map_html | safe }}
    </div>
</div>
{% endif %}

</body>
</html>
