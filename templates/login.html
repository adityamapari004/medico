<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MediGuide</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #070E1C;
            color: #C8D8E8;
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h2 {
            font-family: 'Syne', sans-serif;
            color: #EEF4FF;
            margin-bottom: 24px;
            font-size: 28px;
        }
        h2 span { color: #0ABFA3; }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #5A7090;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            background: #0B1325;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            color: #EEF4FF;
            font-family: inherit;
        }
        .btn {
            background: #0ABFA3;
            color: #070E1C;
            padding: 14px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            width: 100%;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 16px;
            margin-top: 10px;
        }
        .btn:hover { background: #EEF4FF; }
        .links {
            margin-top: 20px;
            font-size: 14px;
        }
        .links a { color: #0ABFA3; text-decoration: none; }
        .flash { color: #ff5e5e; margin-bottom: 15px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Login to <span>MediGuide</span></h2>
        
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="flash">
                    {% for message in messages %}
                        {{ message }}
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn">Login</button>
        </form>
        <div class="links">
            <p>Don't have an account? <a href="/register">Register here</a></p>
            <p><a href="/">Back to Home</a></p>
        </div>
    </div>
</body>
</html>
